<!DOCTYPE html>
<html>
<head>
<style>
body { height: 2000px; }
#flower-garden {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    height: 200px;
    pointer-events: none;
    z-index: 50;
    overflow: visible;
    opacity: 0;
    visibility: hidden;
    transition: opacity 0.4s ease-out, visibility 0s 0.4s;
}
#flower-garden.visible {
    opacity: 1;
    visibility: visible;
    transition: opacity 0.6s ease-in, visibility 0s;
}
#flower-garden svg {
    position: absolute;
    bottom: 0;
    width: 100%;
    height: 200px;
    overflow: visible;
}
#flower-garden .flower-stem {
    transform-origin: bottom center;
    transform-box: fill-box;
    transform: translateY(100px) scale(0);
    transition: transform 0s 0.4s; /* snap to 0 AFTER fade out */
}
#flower-garden.visible .flower-stem {
    transform: translateY(0) scale(5);
    transition: transform 25s cubic-bezier(0.1, 1, 0.4, 1); /* fast start, then slow continuous growth */
}
</style>
</head>
<body>
<div id="flower-garden">
    <svg viewBox="0 0 1200 200" preserveAspectRatio="xMidYMax slice" fill="none" stroke="#888" stroke-width="1">
        <g class="flower-stem">
            <path d="M130 200 Q125 160 140 130 Q155 100 140 70" stroke-linecap="round"/>
            <circle cx="140" cy="55" r="5" fill="#888" stroke="none"/>
        </g>
    </svg>
</div>
<script>
window.addEventListener('scroll', () => {
    if (window.scrollY > 100) {
        document.getElementById('flower-garden').classList.add('visible');
    } else {
        document.getElementById('flower-garden').classList.remove('visible');
    }
});
</script>
</body>
</html>
