<!DOCTYPE html>
<html>
<head>
<style>
#flower-garden { height: 200px; }
#flower-garden path, #flower-garden line {
    stroke-dasharray: 600;
    stroke-dashoffset: 600;
    transition: stroke-dashoffset 2s cubic-bezier(0.4, 0, 0.2, 1);
}
#flower-garden.visible path, #flower-garden.visible line {
    stroke-dashoffset: 0;
}
#flower-garden circle {
    transform: scale(0);
    transform-box: fill-box;
    transform-origin: center center;
    transition: transform 1s cubic-bezier(0.34, 1.56, 0.64, 1) 1s; /* delayed */
}
#flower-garden.visible circle {
    transform: scale(1);
}
</style>
</head>
<body>
<div id="flower-garden">
    <svg viewBox="0 0 1200 200" preserveAspectRatio="xMidYMax slice" fill="none" stroke="#888" stroke-width="1">
        <!-- Stem 2: Whimsical daisy with swirl -->
        <g class="flower-stem">
            <path d="M130 200 Q125 160 140 130 Q155 100 140 70" stroke-linecap="round"/>
            <circle cx="140" cy="55" r="5" fill="#888" stroke="none"/>
            <path d="M140 55 Q140 40 130 35 Q140 42 140 55" fill="none"/>
            <path d="M140 55 Q155 50 162 40 Q152 48 140 55" fill="none"/>
        </g>
    </svg>
</div>
<script>
setTimeout(() => document.getElementById('flower-garden').classList.add('visible'), 500);
</script>
</body>
</html>
