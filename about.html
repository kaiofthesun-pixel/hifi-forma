<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>About — Allen K Lau</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&display=swap');

        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --red: #c0392b;
            --text: #1c1c1c;
            --muted: #999;
        }

        html, body {
            height: 100%;
            overflow: hidden;
        }

        body {
            background: #A29BD4;
            font-family: 'Inter', sans-serif;
            position: relative;
        }

        /* ─── Pink gradient ─── */
        body::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at center, #EE7CA2 0%, #EE7CA2 20%, #ED6689 50%, transparent 100%);
            opacity: 1;
            pointer-events: none;
            animation: pinkBloom 7s cubic-bezier(0.25, 0.8, 0.5, 1) forwards;
        }

        @keyframes pinkBloom {
            0% { opacity: 0; }
            100% { opacity: 1; }
        }

        /* ─── Noise texture ─── */
        body::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 350 350' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='1.8' numOctaves='5' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
            opacity: 0.08;
            pointer-events: none;
            z-index: 300;
        }

        /* ─── Fixed nav ─── */
        nav {
            position: fixed;
            top: 28px;
            right: 44px;
            z-index: 200;
            display: flex;
            align-items: center;
            gap: 22px;
        }
        nav a {
            font-size: 14px;
            font-weight: 500;
            color: rgba(0,0,0,0.5);
            text-decoration: none;
            letter-spacing: 0.02em;
        }
        nav a:hover { color: #000; }
        nav a.active { color: #000; }

        /* ─── Back button ─── */
        .back-btn {
            position: fixed;
            top: 28px;
            left: 44px;
            z-index: 200;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 10px 15px 10px 11px;
            background: transparent;
            border: none;
            border-radius: 12px;
            font-family: 'Inter', sans-serif;
            font-size: 15px;
            font-weight: 500;
            color: #000;
            text-decoration: none;
            transition: color 0.2s ease;
        }
        .back-btn:hover {
            color: #333;
        }
        .back-btn svg {
            width: 16px;
            height: 16px;
            stroke: currentColor;
            stroke-width: 2;
            fill: none;
            stroke-linecap: round;
            stroke-linejoin: round;
        }

        /* ─── Center content ─── */
        .about-center {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: left;
            max-width: 500px;
            font-family: 'Inter', sans-serif;
            font-size: 18px;
            line-height: 1.6;
            color: #333;
            z-index: 10;
            opacity: 0;
            animation: fadeIn 1s ease 0.3s forwards;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .about-center a {
            color: #333;
            text-decoration: underline;
        }
        .about-center a:hover {
            color: #1a1a1a;
        }

        /* ─── Hover images ─── */
        .about-hover-link {
            position: static;
        }
        .about-hover-img {
            position: absolute;
            bottom: 100%;
            left: 0;
            margin-bottom: 30px;
            width: 100%;
            max-height: calc(50vh - 130px);
            object-fit: cover;
            border-radius: 18px;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.8s ease, box-shadow 0.8s ease;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
            z-index: 400;
        }
        .about-hover-link:hover .about-hover-img {
            opacity: 1;
            box-shadow: 0 20px 60px rgba(0,0,0,0.25);
        }

        /* ─── Footer links ─── */
        .about-links-bottom {
            position: absolute;
            bottom: 60px;
            left: 50%;
            transform: translateX(-50%);
            font-family: 'Inter', sans-serif;
            font-size: 12px;
            z-index: 10;
            opacity: 0;
            animation: fadeIn 1s ease 0.5s forwards;
        }
        .about-links-bottom a {
            color: #333;
            text-decoration: underline;
        }
        .about-links-bottom a:hover {
            color: #1a1a1a;
        }
    </style>
</head>
<body>

</div>

</body>
</html>
